name: Generate Data

on:
  schedule:
    - cron: "0 3 * * *" # Nightly at 3 AM UTC
  issues:
    types: [labeled, unlabeled, edited, closed, reopened]
  workflow_dispatch: # Manual trigger

permissions:
  issues: read
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    # Only run on issue events if they have relevant labels
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && (
        contains(github.event.label.name, 'status/') ||
        contains(github.event.label.name, 'tier/') ||
        contains(github.event.label.name, 'platform/') ||
        contains(github.event.label.name, 'genre/') ||
        contains(github.event.label.name, 'payment/') ||
        contains(github.event.label.name, 'feature/') ||
        contains(github.event.label.name, 'warning/') ||
        contains(github.event.label.name, 'has/') ||
        github.event.action == 'edited' ||
        github.event.action == 'closed' ||
        github.event.action == 'reopened'
      ))

    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Run data generation
        working-directory: scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run generate

      - name: Push data to site repo
        env:
          SITE_REPO_TOKEN: ${{ secrets.SITE_REPO_TOKEN }}
        run: |
          SITE_REPO="worthy-mobile-games-site"
          OWNER="${{ github.repository_owner }}"
          CLONE_DIR=$(mktemp -d)

          git clone "https://x-access-token:${SITE_REPO_TOKEN}@github.com/${OWNER}/${SITE_REPO}.git" "$CLONE_DIR"

          # Ensure public/data directory exists
          mkdir -p "$CLONE_DIR/public/data"

          # Copy generated data
          cp output/games.json "$CLONE_DIR/public/data/"
          cp output/search-index.json "$CLONE_DIR/public/data/"
          cp output/meta.json "$CLONE_DIR/public/data/"

          # Commit and push if there are changes
          cd "$CLONE_DIR"
          git config user.name "worthy-bot"
          git config user.email "worthy-bot@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update game data

          Generated by worthy-mobile-games workflow"
            git push
            echo "Data pushed to site repo"
          fi

          # Cleanup
          rm -rf "$CLONE_DIR"
